<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PowerShell Katalog</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;line-height:1.4;margin:0;padding:0;background:#f6f8fb;color:#111}
  header{background:#0b5fa5;color:#fff;padding:18px 20px}
  .wrap{max-width:1100px;margin:20px auto;padding:0 16px}
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  input[type="text"]{flex:1;padding:10px;border:1px solid #d0d7df;border-radius:6px}
  button{padding:10px 12px;border-radius:6px;border:1px solid #0b5fa5;background:#0b5fa5;color:#fff;cursor:pointer}
  button.secondary{background:transparent;color:#0b5fa5}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{padding:10px;border-bottom:1px solid #e6e9ef;text-align:left}
  tr:hover{background:#f0f6ff}
  .detail{background:#fff;border-radius:8px;padding:12px;margin-top:12px;box-shadow:0 6px 18px rgba(11,95,165,0.08)}
  .meta{font-size:0.9rem;color:#555;margin-top:6px}
  .tag{display:inline-block;background:#eef6ff;color:#0b5fa5;padding:4px 8px;border-radius:999px;margin-right:6px;font-size:0.85rem}
  .small{font-size:0.9rem;color:#444}
  footer{margin:40px 0 80px;color:#666;font-size:0.9rem}
  @media (max-width:700px){ .controls{flex-direction:column} table,th,td{font-size:0.95rem} }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1 style="margin:0;font-size:1.25rem">PowerShell Katalog</h1>
    <div style="opacity:.95;margin-top:6px">Schnellsuche für Cmdlets, Syntax, Beispiele und Hinweise</div>
  </div>
</header>
<main class="wrap">
  <div class="controls">
    <input id="q" type="text" placeholder="Suche nach Cmdlet, Beschreibung, Tag oder Kategorie" />
    <button id="searchBtn">Suchen</button>
    <button id="clearBtn" class="secondary">Zurücksetzen</button>
    <label style="display:inline-flex;align-items:center;gap:8px">
      <input id="fileInput" type="file" accept=".csv,.json" style="display:none" />
      <button id="loadBtn" class="secondary">CSV / JSON laden</button>
    </label>
    <button id="sampleBtn" class="secondary">Beispiel laden</button>
  </div>
  <div id="resultsInfo" class="small">Keine Daten geladen</div>
  <table id="resultsTable" aria-live="polite">
    <thead><tr><th>Cmdlet</th><th>Beschreibung</th><th>Kategorie</th><th>Beispiel</th></tr></thead>
    <tbody></tbody>
  </table>
  <div id="detail" class="detail" style="display:none"></div>
  <footer><div class="small">Tipp: Für Teamarbeit die CSV in OneDrive oder Git ablegen. Öffne die Datei lokal oder per Live Server.</div></footer>
</main>
<script>
let catalog = [];
function csvToArray(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  if (lines.length === 0) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = cols[i] ? cols[i] : '');
    return obj;
  });
  return rows;
}
function renderTable(items) {
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';
  items.forEach(it => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><a href="#" class="cmdlink">${escapeHtml(it.Cmdlet || '')}</a></td>
                    <td>${escapeHtml(it.Beschreibung || '')}</td>
                    <td>${escapeHtml(it.Kategorie || '')}</td>
                    <td class="small">${escapeHtml(it.Beispiel || '')}</td>`;
    tr.querySelector('.cmdlink').addEventListener('click', e => {
      e.preventDefault();
      showDetail(it);
    });
    tbody.appendChild(tr);
  });
  document.getElementById('resultsInfo').textContent = items.length + ' Einträge angezeigt';
}
function showDetail(item) {
  const d = document.getElementById('detail');
  d.style.display = 'block';
  d.innerHTML = `<strong style="font-size:1.05rem">${escapeHtml(item.Cmdlet || '')}</strong>
    <div class="meta">${escapeHtml(item.Beschreibung || '')}</div>
    <div style="margin-top:8px"><strong>Syntax</strong><div class="small">${escapeHtml(item.Syntax || '')}</div></div>
    <div style="margin-top:8px"><strong>Parameter</strong><div class="small">${escapeHtml(item.Parameter || '')}</div></div>
    <div style="margin-top:8px"><strong>Beispiel</strong><pre style="background:#f4f7fb;padding:8px;border-radius:6px">${escapeHtml(item.Beispiel || '')}</pre></div>
    <div style="margin-top:8px"><strong>Tags</strong> ${renderTags(item.Tags)}</div>
    <div style="margin-top:10px"><button id="copyBtn">Beispiel kopieren</button> <button id="runPreview" class="secondary">Nur anzeigen</button></div>
    <div style="margin-top:8px" class="small">Quelle: ${escapeHtml(item.Quelle || '—')}</div>`;
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(item.Beispiel || '').then(()=>alert('Beispiel in Zwischenablage kopiert'));
  });
  document.getElementById('runPreview').addEventListener('click', () => {
    alert('Aus Sicherheitsgründen führt dieses Tool keine Befehle aus. Kopiere das Beispiel in deine PowerShell.');
  });
}
function renderTags(t) {
  if (!t) return '';
  return (t.split(';') || []).map(x => `<span class="tag">${escapeHtml(x.trim())}</span>`).join(' ');
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function search(q) {
  if (!catalog.length) return;
  const qq = (q||'').toLowerCase();
  const res = catalog.filter(it => {
    return (!qq) ||
      (it.Cmdlet && it.Cmdlet.toLowerCase().includes(qq)) ||
      (it.Beschreibung && it.Beschreibung.toLowerCase().includes(qq)) ||
      (it.Tags && it.Tags.toLowerCase().includes(qq)) ||
      (it.Kategorie && it.Kategorie.toLowerCase().includes(qq));
  });
  renderTable(res);
}
document.getElementById('searchBtn').addEventListener('click', ()=> search(document.getElementById('q').value));
document.getElementById('clearBtn').addEventListener('click', ()=> { document.getElementById('q').value=''; search(''); document.getElementById('detail').style.display='none'; });
document.getElementById('loadBtn').addEventListener('click', ()=> document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', async (ev) => {
  const f = ev.target.files[0];
  if (!f) return;
  const text = await f.text();
  if (f.name.toLowerCase().endsWith('.json')) {
    try { catalog = JSON.parse(text); } catch(e){ alert('Ungültiges JSON'); return; }
  } else {
    catalog = csvToArray(text);
  }
  search('');
});
document.getElementById('sampleBtn').addEventListener('click', ()=> {
  const sample = [
    {"Cmdlet":"New-ADUser","Beschreibung":"Erstellt ein Benutzerkonto.","Syntax":"New-ADUser -Name <Name> -SamAccountName <sam> -Path <OU>","Parameter":"-Name;-SamAccountName;-Path","Beispiel":"New-ADUser -Name 'Max Mustermann' -SamAccountName m.must -Path 'OU=Users,DC=contoso,DC=local'","Kategorie":"AD","Tags":"user;create","Quelle":"MSLearn","Hinweise":"Benötigt AD-Permissions"},
    {"Cmdlet":"Get-ADUser","Beschreibung":"Ruft ein Benutzerkonto ab.","Syntax":"Get-ADUser -Identity <sam>","Parameter":"-Identity","Beispiel":"Get-ADUser -Identity m.must -Properties *","Kategorie":"AD","Tags":"user;read","Quelle":"MSLearn","Hinweise":"Optional: -Properties"}
  ];
  catalog = sample;
  search('');
});
document.getElementById('q').addEventListener('keydown', (e)=> { if (e.key === 'Enter') { search(e.target.value); } });
document.getElementById('resultsInfo').textContent = 'Lade Beispiel oder CSV/JSON über "CSV / JSON laden".';
</script>
</body>
</html>
